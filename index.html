<body>
    <script defer>

        // variables
        const list = document.querySelector('.content');
        const humanSpan = document.querySelector('#human-score');
        const computerSpan = document.querySelector('#computer-score');
        const span = document.querySelector('.round-winner');
        const winnerMessage = document.querySelector('.content > p');

        let humanScore = 0;
        let computerScore = 0;
        let roundCount = 0;
        
        // get computer choice
        function getComputerChoice() {
            let randomSelect = Math.floor(Math.random() * 3);
            const options = ['rock', 'paper', 'scissors'];
            return options[randomSelect];
        }

        // get human choice
        function getHumanChoice(userChoice) {
           //let userChoice = prompt('Select one option: rock, paper scissors.');
            return userChoice.toLowerCase();
        }

        function playGame(humanChoice) {

            // function that takes human and computer choice to log winner and increment score
            function playRound(humanChoice, computerChoice) {
                if(humanChoice === 'rock') {
                    if (computerChoice === 'scissors') {
                        span.textContent = 'You win! rock beats scissors';
                        humanScore += 1;
                    } else if (computerChoice === 'paper') {
                        span.textContent = 'You lose! paper beats rock';
                        computerScore += 1;
                    } else {
                        span.textContent = 'It is a draw.';
                    }
                } else if (humanChoice === 'paper') {
                    if(computerChoice === 'rock') {
                        span.textContent = 'You win! paper beats rock';
                        humanScore += 1;
                    } else if (computerChoice === 'scissors') {
                        span.textContent = 'You lose! scissors beat paper';
                        computerScore += 1;
                    } else {
                        span.textContent = 'It is a draw.';
                    }
                } else if(humanChoice === 'scissors') {
                    if(computerChoice === 'rock') {
                        span.textContent = 'You lose! rock beats scissors';
                        computerScore += 1;
                    } else if (computerChoice === 'paper') {
                        span.textContent = 'You win! scissors beat paper';
                        humanScore += 1;
                    } else {
                        span.textContent = 'It is a draw.';
                    }
                } else {
                    span.textContent = 'You lose!';
                }
            }

        
            let humanSelection = getHumanChoice(humanChoice);
            let computerSelection = getComputerChoice();

            playRound(humanSelection, computerSelection);

            humanSpan.textContent = humanScore;
            computerSpan.textContent = computerScore;

            if (humanScore === 5) {
                winnerMessage.textContent = 'You win!';
                span.textContent = '';
                humanScore = 0;
                computerScore = 0;
                window.setTimeout(() => {
                    humanSpan.textContent = '0';
                    computerSpan.textContent = '0';
                }, 1000);
            } else if (computerScore === 5) {
                winnerMessage.textContent = 'Computer wins!';
                span.textContent = '';
                humanScore = 0;
                computerScore = 0;
                window.setTimeout(() => {
                    humanSpan.textContent = '0';
                    computerSpan.textContent = '0';
                }, 1000);
            }
            
        }
        
        const buttons = document.querySelectorAll('button');

        buttons.forEach((button) => {
            button.addEventListener('click', (e) => {
                e.preventDefault();
                let selection = e.currentTarget.id;
                //console.log('This is the ID: ', selection);
                playGame(selection);
            });
        });
        
    </script>
